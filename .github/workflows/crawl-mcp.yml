name: "Manual: Crawl MCP Registries"

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Registry to crawl"
        required: true
        type: choice
        options:
          - mcp-registry
          - mcp-so
          - lobehub
          - smithery
          - glama

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore crawl cache
        uses: actions/cache@v4
        with:
          path: data/${{ inputs.registry }}/
          key: ${{ inputs.registry }}-${{ github.run_number }}
          restore-keys: |
            ${{ inputs.registry }}-

      - name: Crawl ${{ inputs.registry }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          PULSEMCP_API_KEY: ${{ secrets.PULSEMCP_API_KEY }}
          PULSEMCP_TENANT_ID: ${{ secrets.PULSEMCP_TENANT_ID }}
        run: |
          case "${{ inputs.registry }}" in
            mcp-registry) MODULE=crawlers.mcp_registry ;;
            mcp-so) MODULE=crawlers.mcp_so ;;
            lobehub) MODULE=crawlers.lobehub ;;
            smithery) MODULE=crawlers.smithery ;;
            glama) MODULE=crawlers.glama ;;
          esac
          python -m $MODULE --output-dir data/${{ inputs.registry }}/
